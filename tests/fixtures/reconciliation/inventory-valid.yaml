schema_version: "0.0.1"
devices:
  - id: "DEVICE-A"
    name: "server"
    os: "linux"
  - id: "DEVICE-B"
    name: "editor"
    os: "darwin"
  - id: "DEVICE-C"
    name: "backup"
    os: "linux"
folders:
  - id: "company-docs"
    label: "Company documents"
    locations:
      - device_id: "DEVICE-A"
        path: "/srv/docs"
        mode: "sendreceive"
      - device_id: "DEVICE-B"
        path: "/Users/editor/docs"
        mode: "sendonly"
      - device_id: "DEVICE-C"
        path: "/backup/docs"
        mode: "receiveonly"
  - id: "assets"
    locations:
      - device_id: "DEVICE-A"
        path: "/srv/assets"
        mode: "sendreceive"
